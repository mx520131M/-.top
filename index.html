<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表弟推荐导航</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: sans-serif;
}
body {
    background: #f0f2f5;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 40px 15px;
}
.title {
    font-size: 26px;
    color: #333;
    margin-bottom: 35px;
    text-align: center;
}
.nav-box {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 600px;
    width: 100%;
}
.nav-item {
    background: #fff;
    border-radius: 12px;
    padding: 18px 8px;
    text-align: center;
    text-decoration: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    transition: transform 0.2s;
}
.nav-item:active {
    transform: scale(0.95);
}
.nav-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    margin-bottom: 8px;
    object-fit: cover;
}
.nav-name {
    font-size: 14px;
    color: #444;
}
</style>
</head>
<body>
    <h1 class="title">表弟推荐导航</h1>
    <div class="nav-box">
        <a href="https://h94fw.top" class="nav-item" target="_blank">
            <img class="nav-icon" src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9r32ns0r0/29c21810377b46319459102995921949~tplv-a9r32ns0r0-image.image">
            <div class="nav-name">汇赢国际</div>
        </a>
        <a href="https://elh39.top" class="nav-item" target="_blank">
            <img class="nav-icon" src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9r32ns0r0/334e9993905448549234794504511799~tplv-a9r32ns0r0-image.image">
            <div class="nav-name">领航国际</div>
        </a>
        <a href="https://uy98x.top" class="nav-item" target="_blank">
            <img class="nav-icon" src="https://p3-flow-image-sign.byteimg.com/tos-cn-i-a9r32ns0r0/99250299200c4006a392012990200999~tplv-a9r32ns0r0-image.image">
            <div class="nav-name">君临国际</div>
        </a>
    </div>
</body>
</html>
